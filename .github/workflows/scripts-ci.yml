name: scripts CI

# Gates the repo's maintained Bash scripts: bash syntax and shellcheck
# over every script under scripts/ and app/scripts/ (the set AGENTS.md
# tells contributors to run), plus the merge-result-audit regression
# suite (isolated synthetic repos, no network). The suite tests the
# audit implementation only; nothing here parses PR prose. shellcheck
# runs as a pinned, checksum-verified prebuilt binary, matching the
# pinned-vacuum/golangci-lint determinism convention (a floating linter
# is nondeterministic verification).

on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "app/scripts/**"
      - ".github/workflows/scripts-ci.yml"
  pull_request:
    paths:
      - "scripts/**"
      - "app/scripts/**"
      - ".github/workflows/scripts-ci.yml"

permissions:
  contents: read

jobs:
  test:
    name: lint and test
    runs-on: ubuntu-latest
    env:
      SHELLCHECK_VERSION: "0.11.0"
      # sha256 of shellcheck-v${SHELLCHECK_VERSION}.linux.x86_64.tar.xz.
      # Bump together with SHELLCHECK_VERSION.
      SHELLCHECK_SHA256: "8c3be12b05d5c177a04c29e3c78ce89ac86f1595681cab149b65b97c4e227198"
    steps:
      - uses: actions/checkout@v4
      - name: bash syntax check
        run: |
          set -euo pipefail
          bash -n scripts/*.sh app/scripts/*.sh
      - name: Install shellcheck (pinned binary, checksum-verified)
        run: |
          set -euo pipefail
          curl -fsSL -o shellcheck.tar.xz \
            "https://github.com/koalaman/shellcheck/releases/download/v${SHELLCHECK_VERSION}/shellcheck-v${SHELLCHECK_VERSION}.linux.x86_64.tar.xz"
          echo "${SHELLCHECK_SHA256}  shellcheck.tar.xz" | sha256sum -c -
          tar -xJf shellcheck.tar.xz "shellcheck-v${SHELLCHECK_VERSION}/shellcheck"
      - name: shellcheck
        run: ./shellcheck-v${SHELLCHECK_VERSION}/shellcheck scripts/*.sh app/scripts/*.sh
      - name: merge-result-audit regression suite
        run: bash scripts/test-merge-result-audit.sh
