name: app CI

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "api/openapi.yaml"
      - ".github/workflows/app-ci.yml"
  pull_request:
    paths:
      - "app/**"
      - "api/openapi.yaml"
      - ".github/workflows/app-ci.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  style:
    name: style (swift-format)
    runs-on: macos-26
    env:
      # Pin the toolchain-bundled swift-format via Xcode selection; a
      # floating tool version would make the formatting gate
      # nondeterministic (same reasoning as the shellcheck and vacuum
      # pins). Bump together with SWIFT_FORMAT_VERSION and the version
      # documented in app/README.md.
      DEVELOPER_DIR: /Applications/Xcode_26.6.app
      SWIFT_FORMAT_VERSION: 6.3.0
    steps:
      - uses: actions/checkout@v4
      - name: Verify pinned swift-format version
        run: |
          version="$(xcrun swift-format --version)"
          if [ "${version}" != "${SWIFT_FORMAT_VERSION}" ]; then
            echo "swift-format ${version} != pinned ${SWIFT_FORMAT_VERSION}" >&2
            exit 1
          fi
      - name: Lint
        working-directory: app
        run: xcrun swift-format lint --strict --recursive Sources Tests Apps Package.swift
      - name: Check formatting drift
        working-directory: app
        run: |
          xcrun swift-format format --in-place --recursive Sources Tests Apps Package.swift
          git diff --exit-code

  package:
    name: package (schema + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify generated API client
        working-directory: app
        run: ./scripts/generate-api-client.sh
      - name: Test Swift package
        working-directory: app
        run: swift test --only-use-versions-from-resolved-file

  apps:
    name: apps (macOS + iOS)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Build macOS app
        working-directory: app
        run: >-
          xcodebuild
          -project Freeside.xcodeproj
          -scheme FreesideMac
          -destination 'platform=macOS'
          -onlyUsePackageVersionsFromResolvedFile
          -skipPackageUpdates
          -skipPackagePluginValidation
          CODE_SIGNING_ALLOWED=NO
          COMPILER_INDEX_STORE_ENABLE=NO
          build
      - name: Build iOS app
        working-directory: app
        run: >-
          xcodebuild
          -project Freeside.xcodeproj
          -scheme FreesideIOS
          -destination 'generic/platform=iOS Simulator'
          -onlyUsePackageVersionsFromResolvedFile
          -skipPackageUpdates
          -skipPackagePluginValidation
          CODE_SIGNING_ALLOWED=NO
          COMPILER_INDEX_STORE_ENABLE=NO
          ARCHS=arm64
          ONLY_ACTIVE_ARCH=YES
          build
