name: Work unit
description: A claimable unit of implementation work
body:
  - type: input
    id: source_devlog
    attributes:
      label: Source devlog entry
      description: >
        For a deferral escalation, cite its repo-relative source entry
        filename. Write "none" for an ordinary work unit.
      placeholder: devlog/YYYY-MM-DD-HHMM-slug.md
    validations:
      required: true
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: >
        The outcome this unit delivers and why: the problem or need, and
        the state of the world when the unit is done.
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: >
        Explicit exclusions: adjacent work this unit deliberately does not
        do, so scope disputes resolve from the record. Write "none" if
        there are none.
    validations:
      required: true
  - type: textarea
    id: contract
    attributes:
      label: Affected interfaces/contracts
      description: >
        Interfaces, domain types, schemas, or API surfaces this unit
        touches (not the whole work contract; the issue as a whole is
        that). If it CHANGES any shared contract, stop: file it as
        kind:contract instead; contract units are exclusive and
        spine-owned.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance
      description: >
        The test and fixture list that defines done. Prefer enumerable
        fixtures (importer cases, sync tests, conformance checks) over prose.
    validations:
      required: true
  - type: textarea
    id: paths
    attributes:
      label: Scope / declared paths
      description: >
        Directories this unit may modify (scope-discipline convention).
        Work outside these paths belongs to another unit.
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: >
        Blocking issue refs (#N; a dependency is satisfied when its PR is
        MERGED, not when the issue is closed), required serialization with
        other units, an intentional stacked base (name the open PR branch),
        and integration order. Write "none" if none.
    validations:
      required: true
